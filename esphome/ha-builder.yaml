# HA Builder Config — Garage All-in-One
#
# Paste this file into the ESPHome Builder add-on in Home Assistant.
# Packages are pulled directly from GitHub — no file copying required.
#
# Required entries in HA secrets.yaml:
#   wifi_ssid: "your-ssid"
#   wifi_password: "your-wifi-password"
#   ap_password: "your-ap-password"
#   ota_password: "your-ota-password"
#   api_encryption_key: "your-32-byte-base64-key"

substitutions:
  device_name: esp32-garage-all-in-one
  friendly_name: "Garage All-in-One"
  firmware_version: "0.1.1"

  # Car Positioning Settings (inches)
  # Garage Door sensor is ceiling-mounted: Y = distance from ceiling to car top; X = lateral offset
  front_target_y_min: "19.7"   # calibrate: (ceiling_height_in - car_height_in) - tolerance
  front_target_y_max: "31.5"
  front_target_x_tolerance: "7.9"
  # Inside Wall sensor is wall-mounted: Y = distance from inside wall into garage; X = height
  rear_target_y_min: "70.9"    # desired parking depth from back wall (inches)
  rear_target_y_max: "86.6"
  rear_target_x_tolerance: "11.8"
  num_leds: "60"
  person_max_distance: "59.1"
  danger_zone_distance: "118.1"

  # Garage Door Settings
  # Recalibrate after first flash: open door fully, read Garage Door - Encoder Counts from HA diagnostics
  garage_door_full_open_counts: "138"   # estimated; recalibrate on hardware

  # GPIO Assignments for ESP32-C6 DevKit (All-in-One)
  led_strip_pin: GPIO0
  garage_door_closed_switch_pin: GPIO1
  garage_door_encoder_a_pin: GPIO2
  garage_door_encoder_b_pin: GPIO3
  garage_door_relay_pin: GPIO10
  ld2450_front_rx_pin: GPIO16
  ld2450_front_tx_pin: GPIO17
  ld2450_rear_rx_pin: GPIO18
  ld2450_rear_tx_pin: GPIO19

packages:
  base: github://jwilleke/garage-car-positioning/esphome/packages/base.yaml@master
  car_sensor: github://jwilleke/garage-car-positioning/esphome/packages/car-sensor.yaml@master
  garage_door: github://jwilleke/garage-car-positioning/esphome/packages/garage-door.yaml@master

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  power_save_mode: none
  enable_on_boot: true
  fast_connect: on
  output_power: 8.5dBm
  ap:
    ssid: "garage-all-in-one"
    password: !secret ap_password
