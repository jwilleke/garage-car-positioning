# Base package for ESP32-C6 garage automation
# Shared by all configurations
#
# Required substitutions (define in main config):
#   device_name: Device hostname
#   friendly_name: Human-readable name
#   firmware_version: Semantic version (e.g., "0.1.1")

globals:
  - id: boot_count
    type: int
    restore_value: true
    initial_value: '0'
  - id: api_reboot_allowed
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: api_no_client_secs
    type: int
    restore_value: false
    initial_value: '0'

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP_WIFI_ENABLE_WPA3_SAE: "n"
      CONFIG_ESP_WIFI_ENABLE_SAE_PK: "n"
      CONFIG_ESP_WIFI_SOFTAP_SAE_SUPPORT: "n"
      CONFIG_ESP_WIFI_ENABLE_WPA3_OWE_STA: "n"

esphome:
  on_boot:
    priority: -100
    then:
      - logger.set_level:
          level: WARN
      - lambda: |-
          id(boot_count) = id(boot_count) + 1;
          id(api_reboot_allowed) = true;
          ESP_LOGI("boot", "Boot count: %d", id(boot_count));

logger:
  level: DEBUG  # compile-time max; runtime level set to WARN on boot
  hardware_uart: USB_SERIAL_JTAG

api:
  id: garage_api
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: false
  sorting_groups:
    - id: group_car
      name: "Car Positioning"
      sorting_weight: 10
    - id: group_door
      name: "Garage Door"
      sorting_weight: 20
    - id: group_config
      name: "Configuration"
      sorting_weight: 30
    - id: group_diag
      name: "Diagnostic"
      sorting_weight: 40

interval:
  - interval: 60s
    then:
      - lambda: |-
          if (id(garage_api).is_connected()) {
            id(api_no_client_secs) = 0;
          } else if (id(api_reboot_allowed)) {
            id(api_no_client_secs) += 60;
            if (id(api_no_client_secs) >= 900) {
              App.reboot();
            }
          }

button:
  - platform: restart
    name: "System - Restart Device"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 41

switch:
  - platform: template
    name: "System - API Reboot Watchdog"
    id: api_reboot_watchdog_switch
    icon: "mdi:restart-alert"
    optimistic: false
    lambda: |-
      return id(api_reboot_allowed);
    turn_on_action:
      - globals.set:
          id: api_reboot_allowed
          value: 'true'
    turn_off_action:
      - globals.set:
          id: api_reboot_allowed
          value: 'false'
      - globals.set:
          id: api_no_client_secs
          value: '0'
    web_server:
      sorting_group_id: group_config
      sorting_weight: 35

select:
  - platform: template
    name: "System - Log Level"
    id: log_level_select
    icon: "mdi:bug"
    options:
      - "Off"
      - "WARN"
      - "INFO"
      - "DEBUG"
    initial_option: "Off"
    restore_value: false
    optimistic: true
    set_action:
      - if:
          condition:
            lambda: 'return x == "WARN";'
          then:
            - logger.set_level:
                level: WARN
      - if:
          condition:
            lambda: 'return x == "INFO";'
          then:
            - logger.set_level:
                level: INFO
      - if:
          condition:
            lambda: 'return x == "DEBUG";'
          then:
            - logger.set_level:
                level: DEBUG
      - if:
          condition:
            lambda: 'return x == "Off";'
          then:
            - logger.set_level:
                level: WARN
    web_server:
      sorting_group_id: group_config
      sorting_weight: 34

sensor:
  - platform: uptime
    name: "System - Uptime Seconds"
    id: uptime_sensor
    internal: true

  - platform: template
    name: "System - Boot Count"
    id: boot_count_sensor
    icon: "mdi:counter"
    accuracy_decimals: 0
    lambda: |-
      return id(boot_count);
    update_interval: 60s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 42

text_sensor:
  - platform: wifi_info
    mac_address:
      name: "System - MAC Address"
      icon: "mdi:network"
      web_server:
        sorting_group_id: group_diag
        sorting_weight: 43

  - platform: template
    name: "System - Reset Reason"
    id: reset_reason_sensor
    icon: "mdi:information"
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON: return std::string("Power-on");
        case ESP_RST_EXT: return std::string("External pin");
        case ESP_RST_SW: return std::string("Software reset");
        case ESP_RST_PANIC: return std::string("Exception/panic");
        case ESP_RST_INT_WDT: return std::string("Interrupt watchdog");
        case ESP_RST_TASK_WDT: return std::string("Task watchdog");
        case ESP_RST_WDT: return std::string("Other watchdog");
        case ESP_RST_DEEPSLEEP: return std::string("Deep sleep wake");
        case ESP_RST_BROWNOUT: return std::string("Brownout");
        case ESP_RST_SDIO: return std::string("SDIO");
        default: return std::string("Unknown");
      }
    update_interval: never
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 44

  - platform: template
    name: "System - Uptime"
    icon: "mdi:clock-outline"
    lambda: |-
      int seconds = (int) id(uptime_sensor).state;
      int weeks = seconds / 604800;
      seconds = seconds % 604800;
      int days = seconds / 86400;
      seconds = seconds % 86400;
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds / 60;
      if (weeks > 0) {
        return str_sprintf("%dw %dd %dh %dm", weeks, days, hours, minutes);
      } else if (days > 0) {
        return str_sprintf("%dd %dh %dm", days, hours, minutes);
      } else if (hours > 0) {
        return str_sprintf("%dh %dm", hours, minutes);
      } else {
        return str_sprintf("%dm", minutes);
      }
    update_interval: 60s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 40

  - platform: template
    name: "System - Firmware Version"
    icon: "mdi:tag"
    lambda: 'return {"${firmware_version}"};'
    update_interval: never
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 46

  - platform: version
    name: "System - ESPHome Version"
    icon: "mdi:home-assistant"
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 45
