# Garage door controller package
# Single-channel pulse counting with direction tracking (issue #13)
# GPIO2 (encoder A) counts pulses; direction set by open/close scripts.
# GPIO3 (encoder B) physically wired but unused — quadrature abandoned due to
# phase-cancellation at fast motor speed (CW ≈ CCW → net zero).
#
# Also includes generic BLE proxy (issue #11):
#   bluetooth_proxy forwards all BLE advertisements + RSSI to HA.
#   HA identifies devices and tracks approach/departure by MAC — firmware is MAC-agnostic.
#
# Required substitutions (define in main config):
#   garage_door_relay_pin: GPIO for relay (e.g., GPIO10)
#   garage_door_closed_switch_pin: GPIO for reed switch (e.g., GPIO1)
#   garage_door_encoder_a_pin: GPIO for encoder A (e.g., GPIO2)
#   garage_door_encoder_b_pin: GPIO for encoder B (e.g., GPIO3) — wired, unused
#
# full_open_counts is a runtime number entity — calibrate from HA without reflashing
# closed_switch state: TRUE = door OPEN, FALSE = door CLOSED (NPN NC sensor)

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: false

bluetooth_proxy:
  active: false

globals:
  - id: encoder_cw_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: encoder_ccw_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: door_counts
    type: int
    restore_value: false
    initial_value: '0'
  - id: door_is_opening
    type: bool
    restore_value: false
    initial_value: 'false'

esphome:
  on_boot:
    priority: -200  # after sensors initialized; handles open-on-boot
    then:
      - if:
          condition:
            binary_sensor.is_on: garage_door_closed_switch
          then:
            - lambda: |-
                id(door_counts) = (int)id(full_open_counts).state;
                id(door_is_opening) = false;

number:
  - platform: template
    name: "Garage Door - Full Open Counts"
    id: full_open_counts
    icon: "mdi:counter"
    min_value: 1
    max_value: 500
    step: 1
    initial_value: 37
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: group_config
      sorting_weight: 37

  - platform: template
    name: "Garage Door - Relay Pulse (ms)"
    id: relay_pulse_ms
    icon: "mdi:timer"
    min_value: 100
    max_value: 2000
    step: 50
    initial_value: 500
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: group_config
      sorting_weight: 36

button:
  - platform: template
    name: "Garage Door - Reset Encoder"
    id: reset_encoder_button
    icon: "mdi:counter-reset"
    on_press:
      - lambda: |-
          id(door_counts) = 0;
          id(door_is_opening) = false;
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 73

script:
  - id: garage_door_open_pulse
    mode: single  # drops concurrent calls during the 50ms closed_switch debounce window
    then:
      - if:
          condition:
            lambda: |-
              return !id(garage_door_closed_switch).state &&
                     id(garage_door).current_operation != cover::COVER_OPERATION_OPENING;
          then:
            - lambda: |-
                id(garage_door).current_operation = cover::COVER_OPERATION_OPENING;
                id(garage_door).publish_state();
                id(door_is_opening) = true;
            - switch.turn_on: garage_door_relay
            - delay: !lambda "return (uint32_t)id(relay_pulse_ms).state + 500;"

  - id: garage_door_close_pulse
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(garage_door_closed_switch).state &&
                     id(garage_door).current_operation != cover::COVER_OPERATION_CLOSING;
          then:
            - lambda: |-
                id(garage_door).current_operation = cover::COVER_OPERATION_CLOSING;
                id(garage_door).publish_state();
                id(door_is_opening) = false;
            - switch.turn_on: garage_door_relay
            - delay: !lambda "return (uint32_t)id(relay_pulse_ms).state + 500;"

switch:
  - platform: gpio
    name: "Garage Door - Toggle"
    pin: ${garage_door_relay_pin}
    id: garage_door_relay
    icon: "mdi:garage-open-variant"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: !lambda "return (uint32_t)id(relay_pulse_ms).state;"
      - switch.turn_off: garage_door_relay
    web_server:
      sorting_group_id: group_config
      sorting_weight: 33

binary_sensor:
  - platform: gpio
    id: encoder_a_pin
    internal: true
    pin:
      number: ${garage_door_encoder_a_pin}
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 1ms
      - delayed_off: 1ms
    on_press:
      - lambda: |-
          if (id(door_is_opening)) {
            id(door_counts) += 1;
            id(encoder_cw_count) += 1;
          } else {
            id(door_counts) = std::max(0, id(door_counts) - 1);
            id(encoder_ccw_count) += 1;
          }

  - platform: gpio
    name: "Garage Door - Closed Switch"
    id: garage_door_closed_switch
    pin:
      number: ${garage_door_closed_switch_pin}
      mode: INPUT_PULLUP
      inverted: true
    device_class: door
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_release:
      - lambda: |-
          id(garage_door).current_operation = cover::COVER_OPERATION_IDLE;
          id(garage_door).publish_state();
          id(door_counts) = 0;
          id(door_is_opening) = true;
    web_server:
      sorting_group_id: group_door
      sorting_weight: 21

sensor:
  - platform: template
    name: "Garage Door - Position"
    id: door_position_pct
    unit_of_measurement: "%"
    icon: "mdi:garage"
    accuracy_decimals: 0
    lambda: |-
      if (!id(garage_door_closed_switch).state) return 0.0f;
      float val = clamp((float)id(door_counts), 0.0f, id(full_open_counts).state);
      float pct = val / id(full_open_counts).state * 100.0f;
      return std::min(100.0f, std::max(0.0f, pct));
    update_interval: 500ms
    web_server:
      sorting_group_id: group_door
      sorting_weight: 22

  - platform: template
    name: "Garage Door - Encoder Counts"
    id: encoder_counts_sensor
    icon: "mdi:counter"
    accuracy_decimals: 0
    lambda: 'return (float)id(door_counts);'
    update_interval: 2s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 72

  - platform: template
    name: "Garage Door - Encoder CW Steps"
    id: encoder_cw_sensor
    icon: "mdi:rotate-right"
    accuracy_decimals: 0
    lambda: 'return id(encoder_cw_count);'
    update_interval: 1s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 76

  - platform: template
    name: "Garage Door - Encoder CCW Steps"
    id: encoder_ccw_sensor
    icon: "mdi:rotate-left"
    accuracy_decimals: 0
    lambda: 'return id(encoder_ccw_count);'
    update_interval: 1s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 77

text_sensor:
  - platform: template
    name: "Garage Door - Status"
    id: door_status
    icon: "mdi:garage"
    lambda: |-
      if (!id(garage_door_closed_switch).state) return {"Closed"};
      int pct = (int)id(door_position_pct).state;
      return str_sprintf("Open %d%%", pct);
    update_interval: 500ms
    web_server:
      sorting_group_id: group_door
      sorting_weight: 20

cover:
  - platform: template
    name: "Garage Door"
    id: garage_door
    device_class: garage
    open_action:
      - script.execute: garage_door_open_pulse
    close_action:
      - script.execute: garage_door_close_pulse
    stop_action:
      - lambda: |-
          id(garage_door).current_operation = cover::COVER_OPERATION_IDLE;
          id(garage_door).publish_state();
      - switch.turn_on: garage_door_relay
    lambda: |-
      if (!id(garage_door_closed_switch).state) {
        return 0.0;
      }
      return id(door_position_pct).state / 100.0f;
    optimistic: false
    assumed_state: false
    web_server:
      sorting_group_id: group_door
      sorting_weight: 23
