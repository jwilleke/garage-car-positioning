# Garage door controller package
# Rotary encoder position tracking with relay control
#
# Required substitutions (define in main config):
#   garage_door_relay_pin: GPIO for relay (e.g., GPIO10)
#   garage_door_closed_switch_pin: GPIO for reed switch (e.g., GPIO1)
#   garage_door_encoder_a_pin: GPIO for encoder A (e.g., GPIO2)
#   garage_door_encoder_b_pin: GPIO for encoder B (e.g., GPIO3)
#
# full_open_counts is now a runtime number entity — calibrate from HA without reflashing

esphome:
  on_boot:
    priority: -200  # after sensors initialized; handles open-on-boot
    then:
      - if:
          condition:
            binary_sensor.is_off: garage_door_closed_switch
          then:
            - sensor.rotary_encoder.set_value:
                id: garage_door_encoder
                value: !lambda "return id(full_open_counts).state;"

number:
  - platform: template
    name: "Garage Door - Full Open Counts"
    id: full_open_counts
    icon: "mdi:counter"
    min_value: 10
    max_value: 500
    step: 1
    initial_value: 50
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: group_config
      sorting_weight: 37

  - platform: template
    name: "Garage Door - Relay Pulse (ms)"
    id: relay_pulse_ms
    icon: "mdi:timer"
    min_value: 100
    max_value: 2000
    step: 50
    initial_value: 500
    restore_value: true
    optimistic: true
    web_server:
      sorting_group_id: group_config
      sorting_weight: 36

button:
  - platform: template
    name: "Garage Door - Reset Encoder"
    id: reset_encoder_button
    icon: "mdi:counter-reset"
    on_press:
      - sensor.rotary_encoder.set_value:
          id: garage_door_encoder
          value: 0
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 73

switch:
  - platform: gpio
    name: "Garage Door - Open / Close"
    pin: ${garage_door_relay_pin}
    id: garage_door_relay
    icon: "mdi:garage-open-variant"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: !lambda "return (uint32_t)id(relay_pulse_ms).state;"
      - switch.turn_off: garage_door_relay
    web_server:
      sorting_group_id: group_config
      sorting_weight: 33

binary_sensor:
  - platform: gpio
    name: "Garage Door - Closed Switch"
    id: garage_door_closed_switch
    pin:
      number: ${garage_door_closed_switch_pin}
      mode: INPUT_PULLUP
      inverted: true
    device_class: door
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - sensor.rotary_encoder.set_value:
          id: garage_door_encoder
          value: 0
    web_server:
      sorting_group_id: group_door
      sorting_weight: 21

sensor:
  - platform: rotary_encoder
    name: "Garage Door - Position Encoder"
    id: garage_door_encoder
    pin_a: ${garage_door_encoder_a_pin}
    pin_b: ${garage_door_encoder_b_pin}
    resolution: 4
    publish_initial_value: false
    filters:
      - debounce: 10ms

  - platform: template
    name: "Garage Door - Position"
    id: door_position_pct
    unit_of_measurement: "%"
    icon: "mdi:garage"
    accuracy_decimals: 0
    lambda: |-
      float val = clamp((float)id(garage_door_encoder).state, 0.0f, id(full_open_counts).state);
      float pct = val / id(full_open_counts).state * 100.0f;
      return std::min(100.0f, std::max(0.0f, pct));
    update_interval: 500ms
    web_server:
      sorting_group_id: group_door
      sorting_weight: 22

  - platform: template
    name: "Garage Door - Encoder Counts"
    id: encoder_counts_sensor
    icon: "mdi:counter"
    accuracy_decimals: 0
    lambda: 'return id(garage_door_encoder).state;'
    update_interval: 2s
    web_server:
      sorting_group_id: group_diag
      sorting_weight: 72

text_sensor:
  - platform: template
    name: "Garage Door - Status"
    id: door_status
    icon: "mdi:garage"
    lambda: |-
      if (id(garage_door_closed_switch).state) return {"Closed"};
      int pct = (int)id(door_position_pct).state;
      return str_sprintf("Open %d%%", pct);
    update_interval: 500ms
    web_server:
      sorting_group_id: group_door
      sorting_weight: 20

cover:
  - platform: template
    name: "Garage Door"
    id: garage_door
    device_class: garage
    open_action:
      - switch.turn_on: garage_door_relay
    close_action:
      - switch.turn_on: garage_door_relay
    stop_action:
      - switch.turn_on: garage_door_relay
    lambda: |-
      if (id(garage_door_closed_switch).state) {
        return 0.0;
      }
      return id(door_position_pct).state / 100.0f;
    optimistic: false
    assumed_state: false
    web_server:
      sorting_group_id: group_door
      sorting_weight: 23
