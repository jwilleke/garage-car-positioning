# tesla-ble.yaml — BLE proximity detection for Blue Moon (Tesla)
# Included from all-in-one.yaml as package "tesla_ble"
#
# TWO-PHASE SETUP
# ───────────────
# Phase 1 (discovery — current):
#   Flash as-is. The bluetooth_proxy forwards all BLE advertisements to HA.
#   With the car awake in the driveway (unlock/lock or open the Tesla app),
#   go to HA → Settings → Devices & Services → Bluetooth and look for the
#   Tesla MAC. It will appear as an unknown device advertising repeatedly.
#   Record the MAC, then add it to secrets.yaml as "blue_moon_ble_mac".
#
# Phase 2 (production):
#   Uncomment the binary_sensor block below, ensure blue_moon_ble_mac is
#   set in secrets.yaml, bump firmware_version in all-in-one.yaml, reflash.
#   Entity exposed to HA: binary_sensor.garage_all_in_one_tesla_blue_moon_approaching

esp32_ble_tracker:
  scan_parameters:
    # 1100ms/1100ms = 100% duty cycle — maximises advertisement capture.
    # WiFi + BLE coexistence is handled by esp-idf scheduler on ESP32-C6.
    interval: 1100ms
    window: 1100ms
    active: false   # passive scan — never initiates a BLE connection

bluetooth_proxy:
  active: false     # passive proxy — forwards advertisements to HA only

